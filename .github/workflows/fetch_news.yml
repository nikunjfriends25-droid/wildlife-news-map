name: Fetch Wildlife News

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}

      - name: Cache spaCy model
        uses: actions/cache@v4
        with:
          path: ~/.cache/spacy
          key: ${{ runner.os }}-spacy-en_core_web_trf-3.7

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_trf

      - name: Run pipeline
        run: python scripts/fetch_and_process.py

      - name: Commit news.json if changed
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add docs/news.json
          if git diff --cached --quiet; then
            echo "No changes to news.json"
          else
            git commit -m "chore: update news.json [skip ci]"
            git push
          fi
