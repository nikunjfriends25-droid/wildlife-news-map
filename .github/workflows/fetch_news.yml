name: Fetch Wildlife News

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run English pipeline
        run: python scripts/fetch_and_process.py

      - name: Run Regional pipeline
        run: python scripts/fetch_regional.py

      - name: Commit updated news files if changed
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add docs/news.json docs/regional/news.json
          if git diff --cached --quiet; then
            echo "No changes to news files"
          else
            git commit -m "chore: update news.json [skip ci]"
            git push
          fi
