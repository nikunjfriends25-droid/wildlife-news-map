<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WildLens — Regional Edition</title>

  <!-- Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <link rel="stylesheet" href="style.css?v=1" />
</head>
<body>

  <!-- ── Left Panel ─────────────────────────────────────────────────────── -->
  <aside id="panel" aria-label="Filters and search">

    <!-- Header -->
    <div id="panel-header">
      <div id="panel-brand">
        <div id="panel-logo" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
            <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
          </svg>
        </div>
        <div id="panel-title-group">
          <span id="panel-title">WildLens</span>
          <span id="panel-subtitle">Regional Edition</span>
          <a id="english-link" href="../" aria-label="Switch to English Edition">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
            English Edition
          </a>
        </div>
      </div>
      <button id="panel-toggle" aria-label="Collapse panel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div id="panel-body">

      <!-- Search -->
      <div class="filter-section" style="padding-top:4px">
        <div class="search-wrapper">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search" type="text" placeholder="Headline, place, source…" autocomplete="off" aria-label="Search articles" />
          <button id="search-clear" class="search-clear" aria-label="Clear search" style="display:none">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Category -->
      <div class="filter-section">
        <button class="section-header open" data-target="cat-body" aria-expanded="true">
          <span class="section-label">Category</span>
          <svg class="chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="section-body" id="cat-body">
          <div id="cat-filters" role="group" aria-label="Category filter">
            <div class="filter-chip active" data-cat="poaching" role="checkbox" aria-checked="true" tabindex="0">
              <span class="chip-dot" style="background:#ef4444" aria-hidden="true"></span>
              <span class="chip-label">Poaching &amp; Crime</span>
              <span class="chip-check" aria-hidden="true">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
            </div>
            <div class="filter-chip active" data-cat="discovery" role="checkbox" aria-checked="true" tabindex="0">
              <span class="chip-dot" style="background:#f59e0b" aria-hidden="true"></span>
              <span class="chip-label">Species Discovery</span>
              <span class="chip-check" aria-hidden="true">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
            </div>
            <div class="filter-chip active" data-cat="conflict" role="checkbox" aria-checked="true" tabindex="0">
              <span class="chip-dot" style="background:#f97316" aria-hidden="true"></span>
              <span class="chip-label">Human-Wildlife Conflict</span>
              <span class="chip-check" aria-hidden="true">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
            </div>
            <div class="filter-chip active" data-cat="research" role="checkbox" aria-checked="true" tabindex="0">
              <span class="chip-dot" style="background:#06b6d4" aria-hidden="true"></span>
              <span class="chip-label">Research &amp; Science</span>
              <span class="chip-check" aria-hidden="true">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
            </div>
            <div class="filter-chip active" data-cat="conservation" role="checkbox" aria-checked="true" tabindex="0">
              <span class="chip-dot" style="background:#818cf8" aria-hidden="true"></span>
              <span class="chip-label">Conservation &amp; Policy</span>
              <span class="chip-check" aria-hidden="true">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- Language -->
      <div class="filter-section">
        <button class="section-header open" data-target="lang-body" aria-expanded="true">
          <span class="section-label">Language</span>
          <svg class="chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="section-body" id="lang-body">
          <div id="lang-filters" role="group" aria-label="Language filter"></div>
        </div>
      </div>

      <!-- Date range -->
      <div class="filter-section">
        <button class="section-header open" data-target="date-body" aria-expanded="true">
          <span class="section-label">Date range</span>
          <svg class="chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="section-body" id="date-body">
          <div id="date-row">
            <div class="date-field">
              <label class="date-label" for="date-from">From</label>
              <input type="date" id="date-from" />
            </div>
            <span class="date-sep" aria-hidden="true">—</span>
            <div class="date-field">
              <label class="date-label" for="date-to">To</label>
              <input type="date" id="date-to" />
            </div>
          </div>
        </div>
      </div>

      <!-- Source (collapsed by default) -->
      <div class="filter-section">
        <button class="section-header" data-target="src-body" aria-expanded="false">
          <span class="section-label">Source</span>
          <svg class="chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="section-body collapsed" id="src-body">
          <div id="source-filters" role="group" aria-label="Source filter"></div>
        </div>
      </div>

    </div><!-- /panel-body -->

    <!-- Footer -->
    <div id="panel-footer">
      <div id="stats" aria-live="polite"></div>
      <button id="reset-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.78"/>
        </svg>
        Reset filters
      </button>
      <div id="footer-meta">
        <span id="translation-note" aria-label="Articles translated to English for search">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Auto-translated
        </span>
      </div>
    </div>

  </aside>

  <!-- ── Map ────────────────────────────────────────────────────────────── -->
  <main id="map" aria-label="WildLens Regional — Interactive wildlife news map of India"></main>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="map.js?v=1"></script>
</body>
</html>
